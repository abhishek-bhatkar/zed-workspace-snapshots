name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Validate CLI syntax
        run: node --check zed-workspace.js

      - name: Validate package contents
        run: npm pack --dry-run

      - name: Smoke test help output
        run: node zed-workspace.js
